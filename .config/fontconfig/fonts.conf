<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <!-- ── Generic family defaults ─────────────────────────────────────── -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>SF Pro Text</family>
      <family>Noto Sans Arabic</family>
    </prefer>
  </alias>

  <alias>
    <family>Sans</family>
    <prefer>
      <family>SF Pro Text</family>
      <family>Noto Sans Arabic</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>New York Medium</family>
      <family>Noto Serif</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>SF Mono</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>

  <alias>
    <family>Mono</family>
    <prefer>
      <family>SF Mono</family>
    </prefer>
  </alias>

  <!-- ── Common sans-serif substitutions → SF Pro Text ───────────────── -->
  <match>
    <test name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Helvetica Neue</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Verdana</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Tahoma</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Trebuchet MS</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Gill Sans</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Calibri</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>San Francisco</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>-apple-system</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>BlinkMacSystemFont</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Comic Sans MS</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Pro Text</string>
    </edit>
  </match>

  <!-- ── Serif substitutions → New York ───────────────────────────────── -->
  <match>
    <test name="family"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>New York</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Times</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>New York</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Georgia</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>New York</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Palatino</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>New York</string>
    </edit>
  </match>

  <!-- ── Monospace substitutions → SF Mono ───────────────────────────── -->
  <match>
    <test name="family"><string>Courier New</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Mono</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Courier</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Mono</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Monaco</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Mono</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Menlo</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Mono</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Consolas</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Mono</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Lucida Console</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>SF Mono</string>
    </edit>
  </match>

</fontconfig>
